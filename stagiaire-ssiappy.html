<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SSIAPPY — Stagiaire</title>
<style>
  :root{--ink:#0e1116;--panel:#151a22;--panel2:#1c232e;--line:#2a333f;--text:#eef2f7;--dim:#9aa7b6;--amber:#f5a623;--red:#e4002b;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(120% 90% at 50% 0%,#20303f,#0e1116 60%);
    color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
  #app{min-height:100%;display:flex;flex-direction:column;max-width:560px;margin:0 auto;padding:18px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .brand{font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:16px}
  .pill{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 10px}
  h1{font-size:20px;margin:14px 0 4px}
  .sub{color:var(--dim);font-size:13.5px;margin-bottom:16px;line-height:1.5}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
  .colors{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cbtn{display:flex;align-items:center;gap:10px;padding:14px;border-radius:14px;border:2px solid var(--line);background:var(--panel2);color:var(--text);font-weight:700;font-size:15px;cursor:pointer}
  .cbtn .d{width:22px;height:22px;border-radius:50%;border:2px solid #0c0f14;flex:0 0 auto}
  .cbtn:disabled{opacity:.4}
  .cbtn.sel{border-color:var(--amber);background:rgba(245,166,35,.12)}
  input.name{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:13px 14px;font:inherit;font-size:16px;margin-top:12px}
  button.go{width:100%;border:none;border-radius:14px;padding:18px;font:inherit;font-weight:800;font-size:19px;color:#fff;
    background:linear-gradient(180deg,#ff2846,var(--red));cursor:pointer;margin-top:12px}
  button.go:disabled{opacity:.4}
  .brBtn{display:block;width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:17px;font:inherit;font-weight:800;font-size:19px;cursor:pointer;margin-bottom:11px}
  .brBtn:hover{border-color:var(--amber);background:rgba(245,166,35,.12)}
  .status{text-align:center;color:var(--dim);font-size:14px;margin:20px 0}
  .banner{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13.5px}
  .banner .d{width:16px;height:16px;border-radius:50%;border:2px solid #0c0f14}
  .qtheme{display:inline-block;font-weight:800;font-size:14px;padding:7px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.3);margin-bottom:14px}
  .qtext{font-size:28px;line-height:1.3;font-weight:700;margin-bottom:10px}
  .qhint{color:var(--dim);font-size:14.5px;margin-bottom:18px}
  .opt{display:flex;align-items:flex-start;gap:13px;padding:18px;border:1px solid var(--line);border-radius:14px;margin-bottom:11px;cursor:pointer;font-size:19px;line-height:1.35}
  .opt .box{width:28px;height:28px;border-radius:8px;border:2px solid var(--dim);flex:0 0 auto;margin-top:2px}
  .opt.sel{border-color:var(--amber);background:rgba(245,166,35,.10)}
  .opt.sel .box{background:var(--amber);border-color:var(--amber)}
  .opt.ok{border-color:#2f9e52;background:rgba(47,158,82,.16)}
  .opt.ok .box{background:#2f9e52;border-color:#2f9e52}
  .opt.ko{border-color:#e4556a;background:rgba(228,85,106,.14)}
  #qOpts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .abtn{display:flex;align-items:center;justify-content:center;height:76px;border-radius:16px;font-size:34px;font-weight:800;color:#fff;cursor:pointer;border:3px solid rgba(255,255,255,.14);box-shadow:0 5px 0 rgba(0,0,0,.28);user-select:none;transition:transform .05s}
  .abtn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.28)}
  .abtn.sel{border-color:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.4),0 5px 0 rgba(0,0,0,.28)}
  .abtn.ok{outline:4px solid #d6ffe6;outline-offset:2px}
  .abtn.ko{opacity:.32}
  .big{font-size:44px;text-align:center;margin:14px 0}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}
  .hide{display:none!important}
  #scrQ{min-height:calc(100dvh - 30px);display:flex;flex-direction:column}
  .qfill{flex:1;display:flex;flex-direction:column;justify-content:center}
  .footer{color:var(--dim);font-size:11px;text-align:center;margin-top:auto;padding-top:16px}
</style>
</head>
<body>
<div id="app">
  <div class="top"><div class="brand">SSIAPPY</div><div class="pill" id="codePill">—</div></div>

  <!-- écran : rejoindre -->
  <div id="scrJoin">
    <h1>Rejoindre la partie</h1>
    <div class="sub">Choisis ta couleur d'agent et entre ton prénom.</div>
    <div class="card">
      <div class="colors" id="colorGrid"></div>
      <input class="name" id="nameInput" type="text" maxlength="14" placeholder="Ton prénom">
      <button class="go" id="joinBtn" disabled>Rejoindre</button>
    </div>
    <div class="status" id="joinStatus"></div>
  </div>

  <!-- écran : attente -->
  <div id="scrWait" class="hide center">
    <div class="banner" id="turnBanner"><span class="d" id="turnDot"></span><span id="turnText">En attente…</span></div>
    <div class="big">⏳</div>
    <div class="status" id="waitStatus">En attente de la prochaine question…</div>
    <button class="go hide" id="turnBtn" style="margin-top:22px">👉 À mon tour</button>
    <button class="go hide" id="rollBtn" style="margin-top:22px">🎲 Lancer le dé</button>
    <div id="stuBranch" class="hide" style="margin-top:20px;width:100%"></div>
  </div>

  <!-- écran : question -->
  <div id="scrQ" class="hide">
    <div class="qfill">
    <div class="banner" id="turnBanner2"><span class="d" id="turnDot2"></span><span id="turnText2"></span></div>
    <span class="qtheme" id="qTheme"></span>
    <div class="qtext" id="qText"></div>
    <div class="qhint" id="qHint"></div>
    <div id="qOpts"></div>
    </div>
    <button class="go" id="sendBtn">Valider ma réponse</button>
    <div class="status" id="qStatus"></div>
  </div>

  <div class="footer">SSIAPPY · Florent Baverel</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL='https://oebnvaxvmrmyvuiuuzwh.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lYm52YXh2bXJteXZ1aXV1endoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODYwMTUsImV4cCI6MjA5MDU2MjAxNX0.pxqus1VcvJqZx-1gGsAsLJodsUD91JGRk4CQuWme7dQ';
const COL={ORANGE:'#E8912F',MAGENTA:'#E6007E',JAUNE:'#FFE500',BLEU:'#33549C',BLANC:'#FFFFFF',VERT:'#5E8A2E',BLEUCL:'#8FB9E8',CREME:'#E7CE7E'};
const CNAME={ORANGE:'Orange',MAGENTA:'Magenta',JAUNE:'Jaune',BLEU:'Bleu',BLANC:'Blanc',VERT:'Vert'};
const ORDER=['ORANGE','MAGENTA','JAUNE','BLEU','BLANC','VERT'];
const q=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const CODE=(params.get('session')||'').trim();
const sid='s'+Math.random().toString(36).slice(2,9);
let sb=null,chan=null,myColor=null,taken={},startedGame=false,joined=false;
const ABT=['#e0322f','#2b7fd4','#e8912f','#3ca15a','#8a54c6','#d64a9e','#00a6a6'];
let curQid=null,curCorrect=null,qAppearedAt=0,sel=new Set(),answered=false;

q('codePill').textContent = CODE ? ('Session '+CODE) : 'Aucune session';

function show(id){['scrJoin','scrWait','scrQ'].forEach(s=>q(s).classList.toggle('hide',s!==id));}
function light(c){return c==='JAUNE'||c==='BLANC'||c==='CREME'||c==='BLEUCL';}

/* ---- grille des couleurs ---- */
function buildColors(){const g=q('colorGrid');g.innerHTML='';
  ORDER.forEach(c=>{const b=document.createElement('button');b.className='cbtn';b.dataset.c=c;
    b.innerHTML='<span class="d" style="background:'+COL[c]+'"></span><span class="nm">'+CNAME[c]+'</span>';
    b.onclick=()=>{if(b.disabled)return;myColor=c;[...g.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel');refreshJoinBtn();};
    g.appendChild(b);});
}
function refreshColors(){[...q('colorGrid').children].forEach(b=>{const c=b.dataset.c;const t=taken[c];
  const mine=myColor===c;b.disabled=!!t&&!mine;
  b.querySelector('.nm').textContent=t?(CNAME[c]+' · '+t):CNAME[c];});refreshJoinBtn();}
function refreshJoinBtn(){q('joinBtn').disabled=!myColor||(taken[myColor]&&taken[myColor]!==q('nameInput').value.trim());}
q('nameInput').addEventListener('input',refreshJoinBtn);

/* ---- connexion realtime ---- */
function connect(){
  if(!CODE){q('joinStatus').textContent='Lien invalide : aucun code de session.';return;}
  if(typeof supabase==='undefined'){q('joinStatus').textContent='Connexion indisponible (SDK non chargé).';return;}
  sb=supabase.createClient(SUPA_URL,SUPA_KEY);
  chan=sb.channel('sim-qcm-'+CODE,{config:{broadcast:{self:false}}});
  chan.on('broadcast',{event:'roster'},({payload})=>{taken=payload.taken||{};startedGame=!!payload.started;refreshColors();});
  chan.on('broadcast',{event:'state'},({payload})=>{onState(payload);});
  chan.on('broadcast',{event:'question'},({payload})=>{onQuestion(payload);});
  chan.on('broadcast',{event:'reveal'},({payload})=>{onReveal(payload);});
  chan.on('broadcast',{event:'branch'},({payload})=>{onBranch(payload);});
  chan.on('broadcast',{event:'branchclear'},()=>{hideBranch();});
  chan.subscribe(st=>{if(st==='SUBSCRIBED'){bcast('hello',{sid});}});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&joined&&chan){try{bcast('hello',{sid});}catch(e){}}});
  window.addEventListener('online',()=>{if(joined&&chan){try{bcast('hello',{sid});}catch(e){}}});
}
function bcast(event,payload){if(chan)chan.send({type:'broadcast',event,payload});}

/* ---- rejoindre ---- */
q('turnBtn').onclick=()=>{bcast('continue',{sid,color:myColor});q('turnBtn').classList.add('hide');q('rollBtn').classList.remove('hide');q('rollBtn').disabled=false;q('rollBtn').textContent='\uD83C\uDFB2 Lancer le dé';q('waitStatus').textContent='\u00C0 toi de lancer le dé !';};
q('rollBtn').onclick=()=>{bcast('roll',{sid,color:myColor});q('rollBtn').disabled=true;q('rollBtn').textContent='Lancé…';q('waitStatus').textContent='En attente de la question…';};
q('joinBtn').onclick=()=>{const name=(q('nameInput').value||'').trim()||CNAME[myColor];
  joined=true;
  bcast('claim',{sid,color:myColor,name});
  q('turnText').textContent='Bienvenue '+name+' !';
  show('scrWait');q('waitStatus').textContent='En attente du démarrage de la partie…';
};

/* ---- état de jeu ---- */
function setBanner(color,txt){const dots=[q('turnDot'),q('turnDot2')],txts=[q('turnText'),q('turnText2')];
  dots.forEach(d=>d.style.background=color?COL[color]:'#555');txts.forEach(t=>t.textContent=txt);}
function onState(p){startedGame=!!p.started;
  if(!joined)return;
  if(p.ended){setBanner(p.winnerColor,'🏆 '+(p.winnerName||'')+' a gagné !');q('rollBtn').classList.add('hide');show('scrWait');q('waitStatus').textContent='Partie terminée.';return;}
  const mine=p.activeColor===myColor;
  setBanner(p.activeColor,(mine?'À toi de jouer !':'Au tour de '+(p.activeName||CNAME[p.activeColor]||'')));
  if(q('scrQ').classList.contains('hide')){show('scrWait');
    const canRoll=mine&&startedGame;
    q('turnBtn').classList.add('hide');q('rollBtn').classList.toggle('hide',!canRoll);q('rollBtn').disabled=false;q('rollBtn').textContent='🎲 Lancer le dé';
    q('waitStatus').textContent=!startedGame?'En attente du démarrage…':(mine?'À toi de lancer le dé !':'En attente de la question…');}
}

/* ---- question ---- */
function onQuestion(p){if(!joined||!p||p.qid===curQid)return;hideBranch();q('turnBtn').classList.add('hide');curQid=p.qid;curCorrect=null;sel=new Set();answered=false;qAppearedAt=performance.now();
  const badge=q('qTheme');badge.textContent=p.themeName||('Thème '+p.theme);
  badge.style.background=COL[p.color]||'#888';badge.style.color=light(p.color)?'#111':'#fff';
  q('qText').textContent='\uD83D\uDC40 Question sur l\u2019\u00E9cran';
  q('qHint').textContent=p.multi?'Touche toutes les bonnes lettres, puis Valide':'Touche la bonne lettre, puis Valide';
  const wrap=q('qOpts');wrap.innerHTML='';
  (p.options||[]).forEach((op,i)=>{const d=document.createElement('div');d.className='abtn';d.dataset.i=i;
    d.style.background=ABT[i%ABT.length];d.textContent=String.fromCharCode(65+i);
    d.onclick=()=>{if(answered)return;if(sel.has(i)){sel.delete(i);d.classList.remove('sel');}else{sel.add(i);d.classList.add('sel');}};
    wrap.appendChild(d);});
  q('sendBtn').disabled=false;q('sendBtn').textContent='Valider ma réponse';q('qStatus').textContent='';
  show('scrQ');
}
q('sendBtn').onclick=()=>{if(answered||!curQid)return;answered=true;
  const elapsed=Math.round(performance.now()-qAppearedAt);
  bcast('answer',{sid,color:myColor,qid:curQid,sel:[...sel],elapsed});
  q('sendBtn').disabled=true;q('sendBtn').textContent='Réponse envoyée';
  q('qStatus').textContent='En attente des autres joueurs…';
};

/* ---- révélation ---- */
function onReveal(p){if(!joined||p.qid!==curQid)return;const correct=new Set(p.correctSet||[]);
  [...q('qOpts').children].forEach(d=>{const i=+d.dataset.i;
    if(correct.has(i))d.classList.add('ok');else if(sel.has(i))d.classList.add('ko');});
  const mine=(p.results||[]).find(r=>r.color===myColor);
  const good=mine&&mine.correct;
  q('qStatus').textContent=good?'✓ Bonne réponse !':'✗ Mauvaise réponse';
  q('qStatus').style.color=good?'#7fe0a3':'#f6a0ad';
  q('sendBtn').classList.add('hide');
  setTimeout(()=>{q('sendBtn').classList.remove('hide');show('scrWait');
    const nextMine=p.activeColor===myColor;
    setBanner(p.activeColor,(nextMine?'À toi de jouer !':'Au tour de '+(p.activeName||CNAME[p.activeColor]||'')));
    q('rollBtn').classList.add('hide');
    q('turnBtn').classList.toggle('hide',!(nextMine&&startedGame));q('turnBtn').disabled=false;
    q('waitStatus').textContent=nextMine?'À toi ! Appuie sur « À mon tour »':'En attente de la prochaine question…';
  },2600);
}

function onBranch(p){if(!joined||!p||p.activeColor!==myColor)return;
  const box=q('stuBranch');box.innerHTML='';
  (p.items||[]).forEach(it=>{const b=document.createElement('button');b.className='brBtn';b.textContent=it.label;
    b.onclick=()=>{bcast('choice',{sid,color:myColor,cell:it.cell});hideBranch();q('waitStatus').textContent='Direction envoyée…';};box.appendChild(b);});
  q('rollBtn').classList.add('hide');box.classList.remove('hide');q('waitStatus').textContent='Choisis ta direction :';show('scrWait');}
function hideBranch(){const box=q('stuBranch');if(box){box.classList.add('hide');box.innerHTML='';}}
buildColors();connect();
</script>
</body>
</html>
